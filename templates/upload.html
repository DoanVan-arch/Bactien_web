<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải lên dữ liệu | Hệ thống tra cứu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="font-bold text-xl text-blue-600">Hệ Thống Tra Cứu</div>
                <div class="space-x-4">
                    {% if current_user.role == 'admin' %}
                        <a href="{{ url_for('upload_file') }}" class="text-gray-600 hover:text-blue-600 font-medium transition">Upload file</a>
                        <a href="{{ url_for('manage_files') }}" class="text-gray-600 hover:text-blue-600 font-medium transition">Quản lý File</a>
                        <a href="{{ url_for('manage_users') }}" class="text-gray-600 hover:text-blue-600 font-medium transition">Quản lý User</a>
                    {% endif %}
                    <a href="{{ url_for('logout') }}" class="text-red-500 hover:text-red-700 font-medium transition">Đăng xuất</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-10 px-4">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 border-b pb-4">Tải lên file dữ liệu Excel</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="bg-blue-50 border-l-4 border-blue-400 text-blue-700 p-4 mb-6 rounded">
                    {% for message in messages %}
                        <p class="text-sm font-medium">{{ message }}</p>
                    {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('upload_file') }}" enctype="multipart/form-data" class="space-y-6">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label class="block text-sm font-bold text-gray-700 mb-3">Chế độ tải lên (áp dụng khi trùng tên file):</label>
                    <div class="flex items-center space-x-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="upload_mode" value="replace" checked class="w-4 h-4 text-blue-600 bg-white border-gray-300 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-700">Thay thế file cũ</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="upload_mode" value="append" class="w-4 h-4 text-blue-600 bg-white border-gray-300 focus:ring-blue-500">
                            <span class="ml-2 text-sm text-gray-700">Thêm nội dung (Nối vào dưới file cũ)</span>
                        </label>
                    </div>
                </div>

                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition">
                    <label class="block text-sm font-medium text-gray-700 mb-4">Chọn file Excel (.xls, .xlsx)</label>
                    <input type="file" name="file" accept=".xls,.xlsx" required 
                           class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>
                
                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow-sm transition duration-200">
                    Thực thi
                </button>
            </form>
        </div>
    </div>

</body>
</html>
